  <script type="text/babel">
/* Tweaks panel */
const { useState: useStT, useEffect: useEfT } = React;

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "blue",
  "density": "comfy"
}/*EDITMODE-END*/;

const ACCENT_MAP = {
  blue: { dark: "#00628C", mid: "#0EA5E9", light: "#34B5FA", soft: "#D9EFFB" },
  coral: { dark: "#B63F3F", mid: "#FF6B6B", light: "#FF8E8E", soft: "#FDD5D5" },
  emerald: { dark: "#0A6E4D", mid: "#0D9668", light: "#27C28A", soft: "#CCEDE0" },
  gold: { dark: "#7F5200", mid: "#F5A623", light: "#F5C065", soft: "#FCE3BC" },
  purple: { dark: "#4F2CA3", mid: "#8B5CF6", light: "#A584F5", soft: "#E3D9F9" },
};

function applyAccent(key) {
  const a = ACCENT_MAP[key];
  if (!a) return;
  const r = document.documentElement.style;
  r.setProperty("--primary", a.mid);
  r.setProperty("--primary-dark", a.dark);
  r.setProperty("--primary-light", a.light);
  r.setProperty("--primary-soft", a.soft);
  r.setProperty("--grad-primary", `linear-gradient(135deg, ${a.dark} 0%, ${a.light} 100%)`);
}

function applyDensity(key) {
  document.documentElement.style.setProperty("--density", key === "tight" ? "0.7" : key === "loose" ? "1.25" : "1");
}

function TweaksPanel() {
  const [on, setOn] = useStT(false);
  const [state, setState] = useStT(DEFAULTS);

  useEfT(() => {
    applyAccent(state.accent);
    applyDensity(state.density);
  }, [state.accent, state.density]);

  useEfT(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setOn(true);
      else if (e.data.type === "__deactivate_edit_mode") setOn(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  function persist(edits) {
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*");
  }

  function setAccent(key) {
    setState(s => ({ ...s, accent: key }));
    persist({ accent: key });
  }
  function setDensity(key) {
    setState(s => ({ ...s, density: key }));
    persist({ density: key });
  }

  return (
    <div className={`tweaks-panel${on ? " on" : ""}`}>
      <div className="tweaks-head">
        <div className="tweaks-title">Tweaks</div>
        <button className="tweaks-close" onClick={() => setOn(false)}>×</button>
      </div>

      <div className="tweak-row">
        <div className="tweak-label">Brand accent</div>
        <div style={{ display: "flex", gap: 6 }}>
          {Object.entries(ACCENT_MAP).map(([k, v]) => (
            <div
              key={k}
              onClick={() => setAccent(k)}
              title={k}
              style={{
                width: 32, height: 32, borderRadius: 10,
                cursor: "pointer",
                background: `linear-gradient(135deg, ${v.dark}, ${v.light})`,
                boxShadow: "var(--shadow-ambient)",
                transition: "transform 0.15s",
                position: "relative",
                transform: state.accent === k ? "scale(1.12)" : "scale(1)",
                outline: state.accent === k ? "2px solid var(--text)" : "none",
                outlineOffset: 3
              }}
            />
          ))}
        </div>
      </div>

      <div className="tweak-row">
        <div className="tweak-label">Density</div>
        <div className="seg">
          {["tight","comfy","loose"].map(d => (
            <button key={d} className={state.density === d ? "on" : ""} onClick={() => setDensity(d)}>{d}</button>
          ))}
        </div>
      </div>

      <div className="tweak-row">
        <div className="tweak-label">Heads up</div>
        <div style={{ fontSize: 12, color: "var(--text-3)", lineHeight: 1.5 }}>
          Brand accent recolors the primary gradient — sky blue is the real one, the others are option explorations.
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { TweaksPanel });

  </script>
