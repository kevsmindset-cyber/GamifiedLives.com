  <style>
/* Gamified Lives — landing based on actual app */

:root {
  --primary: #0EA5E9;
  --primary-dark: #00628C;
  --primary-light: #34B5FA;
  --primary-soft: #D9EFFB;
  --coral: #FF6B6B;
  --coral-soft: #FDD5D5;
  --gold: #F5A623;
  --gold-dark: #7F5200;
  --gold-soft: #FCE3BC;
  --emerald: #0D9668;
  --emerald-soft: #CCEDE0;
  --purple: #8B5CF6;

  --bg: #F6F6F7;
  --card: #FFFFFF;
  --section: #F0F1F2;
  --hover: #E7E8E9;

  --text: #0F172A;
  --text-2: #5A5C5D;
  --text-3: #94A3B8;
  --inverse: #FFFFFF;

  --ghost-border: rgba(219, 221, 223, 0.35);
  --shadow-ambient: 0 8px 32px rgba(15, 23, 42, 0.06);
  --shadow-lift: 0 16px 48px rgba(15, 23, 42, 0.10);
  --shadow-float: 0 24px 64px rgba(15, 23, 42, 0.14);

  --grad-primary: linear-gradient(135deg, #00628C 0%, #34B5FA 100%);

  --r-pill: 9999px;
  --r-card: 24px;
  --r-hero: 32px;

  --density: 1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
  overflow-x: hidden;
}

img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }

/* ============ TYPOGRAPHY ============ */
.eyebrow {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-2);
}

h1, h2, h3, h4 { font-weight: 800; letter-spacing: -0.025em; color: var(--text); line-height: 1.05; }
.h-display { font-size: clamp(48px, 7vw, 104px); font-weight: 800; letter-spacing: -0.035em; line-height: 0.96; }
.h-section { font-size: clamp(36px, 4.6vw, 64px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.02; }
.h-sub { font-size: clamp(22px, 2vw, 28px); font-weight: 800; letter-spacing: -0.02em; }
.body-lg { font-size: 19px; line-height: 1.55; color: var(--text-2); max-width: 54ch; }
.body-md { font-size: 16px; line-height: 1.55; color: var(--text-2); }
.mono { font-family: "SF Mono", "JetBrains Mono", Menlo, monospace; font-size: 12px; letter-spacing: 0.02em; }

/* ============ LAYOUT ============ */
.wrap { max-width: 1280px; margin: 0 auto; padding: 0 clamp(20px, 4vw, 40px); }
section { padding-block: calc(120px * var(--density)); }
section.tight { padding-block: calc(80px * var(--density)); }

/* ============ NAV ============ */
.nav {
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 10px 10px 10px 22px;
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: saturate(140%) blur(20px);
  -webkit-backdrop-filter: saturate(140%) blur(20px);
  border-radius: var(--r-pill);
  box-shadow: var(--shadow-ambient);
  width: min(calc(100vw - 32px), 980px);
}
.nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; letter-spacing: -0.015em; font-size: 15px; }
.nav-logo-mark {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--grad-primary);
  display: grid; place-items: center;
  color: white; font-weight: 900; font-size: 15px;
  box-shadow: 0 4px 10px rgba(14, 165, 233, 0.35);
}
.nav-links { display: flex; gap: 2px; margin-left: auto; }
.nav-link {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-2);
  padding: 8px 14px;
  border-radius: var(--r-pill);
  transition: all 0.18s ease;
}
.nav-link:hover { background: var(--hover); color: var(--text); }
.nav-cta {
  font-size: 14px; font-weight: 700;
  padding: 10px 18px;
  border-radius: var(--r-pill);
  background: var(--grad-primary);
  color: white;
  box-shadow: 0 4px 14px rgba(14, 165, 233, 0.35);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.nav-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(14, 165, 233, 0.45); }

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 28px;
  border-radius: var(--r-pill);
  font-size: 16px; font-weight: 700;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  white-space: nowrap;
}
.btn-primary {
  background: var(--grad-primary);
  color: white;
  box-shadow: 0 8px 24px rgba(14, 165, 233, 0.35);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(14, 165, 233, 0.45); }
.btn-ghost {
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow-ambient);
}
.btn-ghost:hover { background: var(--hover); transform: translateY(-1px); }

/* ============ PILL CHIP ============ */
.chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  border-radius: var(--r-pill);
  background: var(--card);
  box-shadow: var(--shadow-ambient);
  font-size: 13px; font-weight: 600;
  color: var(--text-2);
}
.chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--emerald); box-shadow: 0 0 0 3px rgba(13, 150, 104, 0.18); }
.chip .flame { font-size: 14px; }

/* ============ HERO ============ */
.hero {
  position: relative;
  padding-top: 140px;
  padding-bottom: 60px;
  overflow: hidden;
}
.hero-orb {
  position: absolute;
  top: -220px; right: -260px;
  width: 680px; height: 680px;
  background: radial-gradient(circle, rgba(52, 181, 250, 0.28) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}
.hero-orb-2 {
  position: absolute;
  bottom: -320px; left: -220px;
  width: 560px; height: 560px;
  background: radial-gradient(circle, rgba(255, 107, 107, 0.16) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}
.hero-grid {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 60px;
  align-items: center;
}
@media (max-width: 960px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }

.hero h1 .grad {
  background: var(--grad-primary);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-sub { margin-top: 24px; max-width: 52ch; font-size: 19px; color: var(--text-2); line-height: 1.55; }
.hero-ctas { display: flex; gap: 12px; margin-top: 36px; flex-wrap: wrap; }
.hero-trust {
  margin-top: 44px;
  display: flex; gap: 36px; align-items: center; flex-wrap: wrap;
}
.hero-trust-num { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.025em; line-height: 1; }
.hero-trust-label { color: var(--text-2); font-size: 12px; font-weight: 600; margin-top: 4px; }

/* ============ PHONE ============ */
.phone {
  position: relative;
  width: 340px;
  height: 700px;
  margin: 0 auto;
  background: #0F172A;
  border-radius: 48px;
  padding: 10px;
  box-shadow: var(--shadow-float), 0 60px 80px -20px rgba(15, 23, 42, 0.35);
  flex-shrink: 0;
}
.phone-screen {
  width: 100%; height: 100%;
  background: var(--bg);
  border-radius: 38px;
  overflow: hidden;
  position: relative;
}
.phone-notch {
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  width: 110px; height: 28px;
  background: #0F172A;
  border-radius: 999px;
  z-index: 10;
}
.phone-home-bar {
  position: absolute; bottom: 8px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 4px;
  background: #0F172A;
  border-radius: 999px;
  z-index: 10;
  opacity: 0.2;
}
.ph {
  padding: 54px 20px 0;
  height: 100%;
  display: flex; flex-direction: column;
  background: var(--bg);
}
.ph-status {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; font-weight: 700;
  color: var(--text);
  padding: 0 6px 10px;
}
.ph-status-right { display: flex; gap: 4px; align-items: center; font-size: 11px; }

/* ============ FEATURE TILES (matching app tile design) ============ */
.tiles-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
}
.tile {
  border-radius: var(--r-card);
  padding: 32px;
  color: white;
  position: relative;
  overflow: hidden;
  min-height: 320px;
  display: flex; flex-direction: column;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.tile:hover { transform: translateY(-4px); }
.tile.t-blue { background: #0EA5E9; box-shadow: 0 20px 48px rgba(14, 165, 233, 0.28); }
.tile.t-coral { background: #FF6B6B; box-shadow: 0 20px 48px rgba(255, 107, 107, 0.28); }
.tile.t-emerald { background: #0D9668; box-shadow: 0 20px 48px rgba(13, 150, 104, 0.28); }
.tile.t-gold { background: #F5A623; box-shadow: 0 20px 48px rgba(245, 166, 35, 0.28); }
.tile.t-light { background: var(--card); color: var(--text); box-shadow: var(--shadow-ambient); }
.tile.t-dark { background: var(--text); color: white; box-shadow: var(--shadow-float); }

.tile-sparkle {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  margin-bottom: auto;
  color: rgba(255,255,255,0.95);
}
.tile.t-light .tile-sparkle { color: var(--primary); }
.tile-eyebrow {
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  opacity: 0.8;
  margin-bottom: 10px;
}
.tile h3 {
  font-size: clamp(22px, 2.2vw, 30px);
  font-weight: 800; letter-spacing: -0.025em;
  color: inherit;
  line-height: 1.05;
  margin-bottom: 12px;
}
.tile p {
  font-size: 14px;
  line-height: 1.5;
  opacity: 0.9;
  max-width: 32ch;
}
.tile.t-light p { color: var(--text-2); opacity: 1; }

.tile.span-4 { grid-column: span 4; }
.tile.span-5 { grid-column: span 5; }
.tile.span-6 { grid-column: span 6; }
.tile.span-7 { grid-column: span 7; }
.tile.span-8 { grid-column: span 8; }
.tile.span-12 { grid-column: span 12; }
@media (max-width: 960px) { .tile { grid-column: 1 / -1 !important; min-height: 260px; } }

.tile-ghost-num {
  position: absolute;
  right: -20px; bottom: -40px;
  font-size: 200px; font-weight: 900;
  letter-spacing: -0.05em;
  color: rgba(255,255,255,0.10);
  pointer-events: none;
}

/* Section headers */
.section-header { text-align: center; max-width: 760px; margin: 0 auto 64px; }
.section-header .eyebrow { margin-bottom: 16px; display: inline-block; }
.section-header .body-lg { margin: 20px auto 0; }

.section-alt { background: var(--section); }

/* ============ APP SCREEN SHOWCASE (scrollable) ============ */
.screens-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
  align-items: start;
}
@media (max-width: 1100px) { .screens-strip { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .screens-strip { grid-template-columns: 1fr; } }

.screen-card {
  background: var(--card);
  border-radius: var(--r-card);
  padding: 20px;
  box-shadow: var(--shadow-ambient);
  transition: transform 0.25s, box-shadow 0.25s;

}
.screen-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lift); }
.screen-card-head { display: flex; align-items: center; justify-content: space-between; }
.screen-card-num {
  font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-3);
}
.screen-card-icon {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--primary-soft);
  display: grid; place-items: center;
  color: var(--primary-dark);
}
.screen-card h4 { font-size: 17px; font-weight: 800; letter-spacing: -0.015em; }
.screen-card p { font-size: 13px; color: var(--text-2); line-height: 1.5; }

/* ============ DEMO SHELL ============ */
.demo-shell {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 60px;
  align-items: center;
}
@media (max-width: 960px) { .demo-shell { grid-template-columns: 1fr; } }

.demo-tabs {
  display: flex; gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.demo-tab {

  box-shadow: var(--shadow-ambient);

  color: var(--text-2);

  letter-spacing: 0.08em;
  text-transform: uppercase;

.demo-tab.active {

.demo-info h3 { font-size: clamp(30px, 3.2vw, 44px); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 16px; line-height: 1.05; }

.callouts { display: flex; flex-direction: column; gap: 10px; }

  border-radius: 18px;

}
.callout-icon {
  width: 40px; height: 40px;
  border-radius: 12px;

  flex-shrink: 0;
}
.callout-icon.coral { background: var(--coral-soft); color: #B63F3F; }
.callout-icon.gold { background: var(--gold-soft); color: var(--gold-dark); }
.callout-icon.emerald { background: var(--emerald-soft); color: #075B41; }
.callout-title { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; }
.callout-body { font-size: 13px; color: var(--text-2); margin-top: 3px; }

.squad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch; }
@media (max-width: 900px) { .squad-grid { grid-template-columns: 1fr; } }

}
.squad-card-title {
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-3);

  border-radius: var(--r-card);
  padding: 24px;
  color: white;
  margin-bottom: 12px;

  overflow: hidden;

  grid-template-columns: repeat(3, 1fr);

}

.pcard-price { display: flex; align-items: baseline; gap: 4px; margin-top: -8px; }
.pcard-price .amt { font-size: 52px; font-weight: 900; letter-spacing: -0.035em; line-height: 1; }
.pcard-price .per { font-size: 14px; color: var(--text-2); font-weight: 600; }
.pcard.featured .pcard-price .per { color: rgba(255,255,255,0.6); }
.pcard ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.pcard li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; }
.pcard li::before {
  content: "✓";
  color: var(--emerald);
  font-weight: 900;
  flex-shrink: 0;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(13, 150, 104, 0.15);
  display: grid; place-items: center;
  font-size: 11px;
}
.pcard.featured li::before { background: rgba(255, 255, 255, 0.15); color: #fff; }
.pcard .btn { margin-top: auto; justify-content: center; }
.pcard.featured .btn-primary { background: var(--gold); color: var(--gold-dark); box-shadow: 0 6px 20px rgba(245, 166, 35, 0.35); }

/* ============ FAQ ============ */
.faq { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
.faq-item {
  background: var(--card);
  border-radius: var(--r-card);
  padding: 22px 28px;
  box-shadow: var(--shadow-ambient);
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.faq-item:hover { box-shadow: var(--shadow-lift); }
.faq-q {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
}
.faq-q-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--section);
  display: grid; place-items: center;
  font-weight: 800; transition: transform 0.25s;
  flex-shrink: 0;
}
.faq-item.open .faq-q-icon { transform: rotate(45deg); background: var(--primary); color: white; }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, margin-top 0.35s ease;
  color: var(--text-2);
  font-size: 15px; line-height: 1.55;
}
.faq-item.open .faq-a { max-height: 260px; margin-top: 14px; }

/* ============ TESTIMONIALS ============ */
.testimonials {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
@media (max-width: 900px) { .testimonials { grid-template-columns: 1fr; } }
.tcard {
  background: var(--card);
  border-radius: var(--r-card);
  padding: 28px;
  box-shadow: var(--shadow-ambient);
  display: flex; flex-direction: column; gap: 16px;
}
.tcard-quote { font-size: 17px; font-weight: 600; line-height: 1.45; color: var(--text); letter-spacing: -0.01em; }
.tcard-meta { display: flex; align-items: center; gap: 12px; margin-top: auto; }
.tcard-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: grid; place-items: center;
  color: white; font-weight: 800;
  background: var(--grad-primary);
  flex-shrink: 0;
}
.tcard-name { font-size: 14px; font-weight: 800; }
.tcard-role { font-size: 12px; color: var(--text-3); }

/* ============ CTA BANNER ============ */
.cta-banner {
  background: var(--text);
  border-radius: var(--r-hero);
  padding: 72px 56px;
  color: white;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-float);
}
.cta-banner h2 { color: white; }
.cta-banner::before {
  content: "";
  position: absolute;
  inset: -80px;
  background:
    radial-gradient(circle at 20% 30%, rgba(14, 165, 233, 0.36), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255, 107, 107, 0.26), transparent 45%);
  pointer-events: none;
}
.cta-banner > * { position: relative; z-index: 1; }
.cta-banner .body-lg { color: rgba(255, 255, 255, 0.78); margin: 20px auto 36px; }
.cta-banner .hero-ctas { justify-content: center; }

/* ============ FOOTER ============ */
.footer {
  padding: 60px 0 40px;
  border-top: 1px solid var(--ghost-border);
}
.footer-grid { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 32px; }
.footer-cols { display: flex; gap: 56px; flex-wrap: wrap; }
.footer h5 { font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 14px; color: var(--text); }
.footer ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.footer li a { font-size: 14px; color: var(--text-2); }
.footer li a:hover { color: var(--text); }
.footer-base { margin-top: 40px; display: flex; justify-content: space-between; font-size: 13px; color: var(--text-3); flex-wrap: wrap; gap: 12px; }

/* ============ TWEAKS PANEL ============ */
.tweaks-panel {
  position: fixed;
  right: 20px; bottom: 20px;
  width: 280px;
  background: var(--card);
  border-radius: var(--r-card);
  padding: 20px;
  box-shadow: var(--shadow-float);
  z-index: 200;
  display: none;
  flex-direction: column;
  gap: 14px;
}
.tweaks-panel.on { display: flex; animation: popIn 0.25s ease; }
@keyframes popIn {
  0% { transform: scale(0.92); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.tweaks-head { display: flex; justify-content: space-between; align-items: center; }
.tweaks-title { font-size: 14px; font-weight: 800; letter-spacing: -0.01em; }
.tweaks-close { font-size: 18px; color: var(--text-3); width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; }
.tweaks-close:hover { background: var(--hover); color: var(--text); }
.tweak-row { display: flex; flex-direction: column; gap: 6px; }
.tweak-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); }
.seg { display: flex; background: var(--section); padding: 3px; border-radius: var(--r-pill); }
.seg button {
  flex: 1;
  padding: 6px 10px;
  border-radius: var(--r-pill);
  font-size: 12px; font-weight: 700;
  color: var(--text-2);
  transition: all 0.15s;
}
.seg button.on { background: var(--card); color: var(--text); box-shadow: var(--shadow-ambient); }

/* ============ IN-APP PHONE SCREEN STYLES ============ */
/* Reusable phone UI matching actual app */
.a-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.a-head-left { display: flex; align-items: center; gap: 12px; }
.a-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--primary);
  display: grid; place-items: center;
  color: white; font-weight: 800; font-size: 18px;
  box-shadow: 0 4px 12px rgba(14, 165, 233, 0.35);
}
.a-name { font-size: 18px; font-weight: 800; letter-spacing: -0.015em; }
.a-sub { font-size: 11px; color: var(--text-2); margin-top: 1px; }
.a-head-right { display: flex; gap: 8px; align-items: center; }
.a-flame-chip {
  background: #FFE8E8;
  color: #B63F3F;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px; font-weight: 800;
  display: flex; align-items: center; gap: 4px;
}
.a-icon-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--hover);
  display: grid; place-items: center;
  color: var(--text-2);
}

.a-sec-title {
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-3);
  margin: 14px 2px 4px;
}
.a-big-level {
  font-size: 32px; font-weight: 900;
  letter-spacing: -0.025em;
  color: var(--primary-dark);
  line-height: 1;
}
.a-level-row {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 8px;
}
.a-xp { font-size: 13px; color: var(--gold-dark); font-weight: 800; }
.a-xp .xp-small { color: var(--text-3); font-weight: 600; }
.a-bar {
  height: 10px;
  background: #E3F2FB;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 14px;
}
.a-bar-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 999px;
  transition: width 0.7s cubic-bezier(.22,.9,.35,1);
}

.a-card {
  background: var(--card);
  border-radius: 16px;
  padding: 14px;
  box-shadow: var(--shadow-ambient);
  margin-bottom: 10px;
}
.a-pass-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.a-pass-label { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-dark); }
.a-pass-boost {
  background: var(--primary-soft); color: var(--primary-dark);
  padding: 3px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 800;
  display: flex; align-items: center; gap: 3px;
}
.a-pass-title { display: flex; align-items: baseline; gap: 6px; font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
.a-pass-title .of { color: var(--text-3); font-weight: 600; }
.a-pass-bar {
  height: 6px;
  background: var(--hover);
  border-radius: 999px;
  overflow: hidden;
  margin: 6px 0 4px;
}
.a-pass-bar-fill {
  height: 100%; width: 12%;
  background: var(--gold);
  border-radius: 999px;
}
.a-pass-meta { font-size: 10px; color: var(--text-2); font-weight: 600; }

.a-mood {
  text-align: center;
  background: #E6F1FA;
  color: var(--text);
  font-size: 12px; font-weight: 600;
  padding: 10px;
  border-radius: 999px;
  margin: 10px 0;
}

.a-tasks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
.a-task {
  border-radius: 16px;
  padding: 12px;
  color: white;
  min-height: 110px;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative;
  cursor: pointer;
  transition: transform 0.2s;
}
.a-task:hover { transform: translateY(-2px); }
.a-task.done { opacity: 0.82; }
.a-task.b { background: #8EC8E8; }
.a-task.c { background: #F4A3A3; }
.a-task.g { background: #3B9D79; }
.a-task.y { background: #E5B866; }
.a-task-sparkle { font-size: 14px; color: white; }
.a-task-title { font-size: 13px; font-weight: 800; letter-spacing: -0.01em; color: white; line-height: 1.15; }
.a-task-done {
  margin-top: 6px;
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
  opacity: 0.95;
}

/* tab bar */
.a-tabbar {
  margin: auto -20px 0;
  padding: 8px 12px 12px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  display: flex; justify-content: space-around;
  border-top: 1px solid var(--ghost-border);
}
.a-tab {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 9px; font-weight: 800; letter-spacing: 0.08em;
  color: var(--text-3);
  padding: 4px 2px;
}
.a-tab.active { color: var(--primary-dark); }
.a-tab.active .a-tab-icon { background: var(--primary-soft); color: var(--primary-dark); }
.a-tab-icon {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  border-radius: 8px;
  color: var(--text-3);
}

/* XP burst */
.xp-burst {
  position: absolute;
  font-size: 14px; font-weight: 900;
  color: var(--gold);
  pointer-events: none;
  animation: xpFloat 1.2s ease-out forwards;
  z-index: 20;
}
@keyframes xpFloat {
  0% { transform: translateY(0) scale(0.8); opacity: 0; }
  20% { opacity: 1; transform: translateY(-8px) scale(1.1); }
  100% { transform: translateY(-60px) scale(1); opacity: 0; }
}

/* Small screen minis (inside screen-card) */
.mini-screen {
  aspect-ratio: 9 / 16;
  border-radius: 16px;
  overflow: hidden;
  background: var(--bg);
  padding: 14px;
  box-shadow: inset 0 0 0 1px var(--ghost-border);
  display: flex; flex-direction: column;
  gap: 8px;
}
.mini-title { font-size: 13px; font-weight: 800; letter-spacing: -0.015em; }
.mini-sub { font-size: 9px; color: var(--text-3); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }

/* Goal card compact */
.mini-goal {
  border-radius: 10px;
  padding: 8px 10px;
  color: white;
  font-size: 11px; font-weight: 800;
  display: flex; justify-content: space-between; align-items: center;
}
.mini-goal.b { background: #0EA5E9; }
.mini-goal.c { background: #FF6B6B; }
.mini-goal.g { background: #0D9668; }
.mini-pill { background: rgba(255,255,255,0.24); padding: 2px 6px; border-radius: 999px; font-size: 9px; }

/* Animation helpers */
@keyframes floaty {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Marquee for "titles" */
.title-marquee {
  overflow: hidden;
  mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
  padding: 28px 0;
}
.title-track {
  display: flex; gap: 14px;
  animation: slide 40s linear infinite;
  width: max-content;
}
@keyframes slide { to { transform: translateX(-50%); } }
.title-pill {
  padding: 14px 26px;
  border-radius: 999px;
  background: var(--card);
  box-shadow: var(--shadow-ambient);
  font-size: 15px; font-weight: 800;
  letter-spacing: -0.015em;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  color: var(--text);
}
.title-pill-dot {
  width: 12px; height: 12px;
  border-radius: 3px;
  transform: rotate(45deg);
}


/* ============ HIERARCHY SECTION ============ */
.hierarchy-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 48px;
}
@media (max-width: 900px) { .hierarchy-grid { grid-template-columns: 1fr; } }
.h-card {
  background: var(--card);
  border-radius: var(--r-card);
  padding: 32px;
  box-shadow: var(--shadow-ambient);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.h-card-rank {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
}
.h-card-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  display: flex; align-items: center; gap: 10px;
}
.h-card-sub {
  font-size: 15px;
  color: var(--text-2);
  line-height: 1.55;
}
.h-card-glyph {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
}
.h-card-mock {
  background: var(--section);
  border-radius: 16px;
  padding: 16px;
  margin-top: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.h-mock-row {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 700; color: var(--text);
}
.h-mock-row .check {
  width: 18px; height: 18px; border-radius: 6px;
  background: var(--primary);
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-size: 11px; flex-shrink: 0;
}
.h-mock-row .box {
  width: 18px; height: 18px; border-radius: 6px;
  border: 2px solid #CBD5E1; flex-shrink: 0;
}
.h-mock-progress {
  height: 6px; background: #E2E8F0; border-radius: 999px; overflow: hidden;
  margin-top: 2px;
}
.h-mock-progress-fill {
  height: 100%; background: var(--primary); border-radius: 999px;
}
.h-flow-arrow {
  position: absolute;
  top: 50%; right: -30px;
  transform: translateY(-50%);
  width: 40px; height: 2px;
  background: var(--text-3);
}
.h-flow-arrow::after {
  content: ''; position: absolute; right: 0; top: -5px;
  border: 6px solid transparent;
  border-left-color: var(--text-3);
}
@media (max-width: 900px) { .h-flow-arrow { display: none; } }

.h-example {
  margin-top: 56px;
  background: var(--card);
  border-radius: var(--r-hero);
  padding: 40px;
  box-shadow: var(--shadow-lift);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 24px;
  align-items: start;
}
@media (max-width: 900px) { .h-example { grid-template-columns: 1fr; } }
.h-ex-col { display: flex; flex-direction: column; gap: 14px; }
.h-ex-label {
  font-size: 10px; font-weight: 900; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text-3);
}
.h-ex-big {
  font-size: 24px; font-weight: 800; letter-spacing: -0.02em;
  line-height: 1.15;
}
.h-ex-note { font-size: 13px; color: var(--text-2); }
.h-ex-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 999px;
  background: var(--primary-soft); color: var(--primary-dark);
  font-size: 12px; font-weight: 700;
  width: fit-content;
}

/* ============ ANALYTICS SECTION ============ */
.analytics-tabs {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 32px;
}
.analytics-tab {
  padding: 10px 20px; border-radius: 999px;
  font-size: 13px; font-weight: 800; letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--card);
  color: var(--text-2);
  box-shadow: var(--shadow-ambient);
  transition: all 0.18s;
}
.analytics-tab.active {
  background: var(--primary); color: white;
}
.analytics-stage {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 20px;
}
.ana-card {
  background: var(--card);
  border-radius: 20px;
  padding: 24px;
  box-shadow: var(--shadow-ambient);
  display: flex; flex-direction: column; gap: 14px;
}
.ana-card-label {
  font-size: 11px; font-weight: 900; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-2);
}
.ana-card h4 {
  font-size: 22px; font-weight: 800; letter-spacing: -0.015em;
}

/* sparkline + bars */
.spark {
  display: flex; align-items: flex-end; gap: 3px;
  height: 80px;
}
.spark-bar {
  flex: 1;
  background: var(--primary);
  border-radius: 3px 3px 0 0;
  min-height: 4px;
}
.spark-bar.dim { background: #CBD5E1; }
.spark-dots {
  display: flex; align-items: center; gap: 4px;
  height: 12px;
}
.spark-dots span {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--primary);
  opacity: 0.6;
  flex-shrink: 0;
}

/* heatmap (consistency grid) */
.heatmap-90 {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  gap: 4px;
  padding: 4px 0;
}
.heat-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  background: #E2E8F0;
}

/* time-of-day */
.tod-grid {
  display: grid;
  grid-template-columns: 60px repeat(4, 1fr);
  gap: 8px;
  font-size: 12px;
  color: var(--text-2);
}
.tod-grid .tod-h { font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; color: var(--text-3); }
.tod-cell {
  aspect-ratio: 1.4;
  border-radius: 10px;
  background: #EEF2F5;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 15px; color: var(--text);
}

/* weekday bars */
.wd-bars {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 10px; align-items: end;
  height: 180px;
  padding-top: 18px;
}
.wd-col { display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; }
.wd-bar {
  width: 100%; background: var(--primary);
  border-radius: 6px 6px 0 0;
  position: relative;
  min-height: 4px;
}
.wd-bar.best { background: var(--coral); }
.wd-val {
  position: absolute; top: -22px; left: 0; right: 0;
  text-align: center; font-size: 13px; font-weight: 800;
}
.wd-label { font-size: 11px; font-weight: 700; color: var(--text-2); letter-spacing: 0.04em; }
.wd-label.best { color: var(--coral); }

/* habit card */
.habit-ana {
  background: var(--section);
  border-radius: 16px;
  padding: 18px;
  display: flex; flex-direction: column; gap: 12px;
}
.habit-ana-head {
  display: flex; justify-content: space-between; align-items: baseline;
}
.habit-ana-pct { font-size: 28px; font-weight: 900; }
.habit-ana-pct.low { color: #E11D48; }
.habit-ana-pct.mid { color: var(--gold); }
.habit-ana-pct.hi { color: var(--emerald); }
.habit-ana-name { font-size: 17px; font-weight: 800; }
.habit-ana-freq { font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; }
.habit-ana-bar { height: 8px; background: var(--primary-soft); border-radius: 999px; overflow: hidden; }
.habit-ana-bar > span { display: block; height: 100%; border-radius: 999px; }

/* life domain mini cards */
.life-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
}
@media (max-width: 1100px) { .life-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px) { .life-grid { grid-template-columns: repeat(2, 1fr); } }
.life-mini {
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  border-left: 4px solid var(--primary);
  display: flex; flex-direction: column; gap: 8px;
  box-shadow: var(--shadow-ambient);
}
.life-mini-name {
  font-size: 11px; font-weight: 900; letter-spacing: 0.18em;
  text-transform: uppercase;
}
.life-mini-hero {
  font-size: 26px; font-weight: 900; letter-spacing: -0.02em;
}
.life-mini-sub { font-size: 12px; color: var(--text-2); }

/* mood correlation */
.mood-corr { display: flex; flex-direction: column; gap: 8px; }
.mood-bars { display: flex; align-items: end; gap: 3px; height: 70px; }
.mood-bars div { flex: 1; background: var(--primary); border-radius: 2px 2px 0 0; }
.mood-row { display: flex; gap: 3px; }
.mood-row span {
  flex: 1; aspect-ratio: 1; max-width: 28px; border-radius: 50%;
  background: #E2E8F0;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.mood-row span.filled { background: var(--emerald-soft); }
.mood-insight {
  margin-top: 8px;
  padding: 12px 14px;
  background: var(--primary-soft);
  border-radius: 12px;
  font-size: 13px;
  color: var(--primary-dark);
  font-weight: 600;
  line-height: 1.5;
}

.ana-stat-row { display: flex; gap: 14px; }
.ana-stat {
  flex: 1;
  padding: 14px;
  background: var(--section);
  border-radius: 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.ana-stat-v { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; }
.ana-stat-l { font-size: 11px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em; }

.ana-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  background: var(--emerald-soft);
  color: #065F46;
  border-radius: 999px;
  font-size: 12px; font-weight: 800;
  width: fit-content;
}
.ana-badge.coral { background: var(--coral-soft); color: #9B1C1C; }


/* ============ DEMO V2 ============ */
.demo2-shell {
  display: grid;
  grid-template-columns: 1fr 1.05fr;
  gap: 48px;
  margin-top: 48px;
  align-items: start;
}
@media (max-width: 1000px) {
  .demo2-shell { grid-template-columns: 1fr; }
}

.demo2-phone-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  position: sticky; top: 40px;
}

.demo2-phone {
  width: 340px;
  aspect-ratio: 9 / 19.5;
  background: #0F172A;
  border-radius: 44px;
  padding: 10px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.25), 0 0 0 1px rgba(15,23,42,0.12);
  position: relative;
}
.demo2-phone-notch {
  position: absolute;
  top: 18px; left: 50%;
  transform: translateX(-50%);
  width: 100px; height: 28px;
  background: #0F172A;
  border-radius: 999px;
  z-index: 3;
}
.demo2-phone-screen {
  background: #F6F6F7;
  border-radius: 36px;
  height: 100%;
  overflow: hidden;
  position: relative;
}
.demo2-phone-home {
  position: absolute;
  bottom: 8px; left: 50%;
  transform: translateX(-50%);
  width: 110px; height: 4px;
  background: white;
  border-radius: 4px;
  opacity: 0.6;
}

.d-screen {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 0;
  font-size: 13px;
  position: relative;
  overflow: hidden;
}
.d-status {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 22px 8px;
  font-size: 12px; font-weight: 700;
  color: var(--text);
}
.d-status-right { display: flex; gap: 6px; font-size: 11px; letter-spacing: -0.5px; }
.d-sig { color: var(--text); }
.d-batt {
  width: 20px; height: 10px;
  border: 1.2px solid var(--text);
  border-radius: 2px;
  position: relative;
}
.d-batt::after {
  content: '';
  position: absolute;
  inset: 1.5px;
  width: 50%;
  background: var(--text);
  border-radius: 1px;
}

/* Header */
.d-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 18px 10px;
}
.d-head-left { display: flex; align-items: center; gap: 10px; }
.d-avatar-wrap {
  position: relative;
  width: 38px; height: 38px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
}
.d-avatar-ring::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  border-top-color: transparent;
  animation: d-ring-spin 0.9s linear 1 forwards;
}
.d-avatar-ring-full::before {
  border: 3px solid var(--gold);
  animation: d-ring-pulse 0.9s ease-out 1;
}
@keyframes d-ring-spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(720deg); }
}
@keyframes d-ring-pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.6; }
  100% { transform: scale(1); opacity: 1; }
}
.d-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #E0F2FE, #BFDBFE);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 16px;
  color: var(--primary-dark);
}
.d-name { font-weight: 800; font-size: 14px; color: var(--text); }
.d-sub { font-size: 10.5px; color: var(--text-2); }
.d-flame {
  background: var(--coral-soft);
  color: #9B1C1C;
  padding: 5px 10px; border-radius: 999px;
  font-weight: 800; font-size: 12px;
  transition: transform 0.24s;
}
.d-flame-pulse {
  animation: d-flame-pulse 0.6s ease-out 1;
}
.d-flame-broken {
  background: #E2E8F0; color: var(--text-3);
}
@keyframes d-flame-pulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.35); background: #FCA5A5; }
  100% { transform: scale(1); }
}

/* Section titles */
.d-sectitle {
  padding: 6px 18px 4px;
  font-size: 10px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--text-2);
}
.d-sectitlerow {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 18px 4px;
}
.d-sectitle-aside { font-size: 11px; font-weight: 800; color: var(--primary-dark); }

/* Level row */
.d-levelrow {
  padding: 2px 18px 6px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.d-biglevel {
  font-size: 22px; font-weight: 900;
  letter-spacing: -0.02em;
}
.d-biglevel-flip { animation: d-flip 0.6s ease-out 1; }
@keyframes d-flip {
  0% { transform: perspective(400px) rotateX(0); }
  50% { transform: perspective(400px) rotateX(90deg); color: var(--gold); }
  100% { transform: perspective(400px) rotateX(0); }
}
.d-xp { font-size: 12px; font-weight: 700; }
.d-xpmax { color: var(--text-3); font-weight: 600; }
.d-xp-countup { animation: d-count 0.4s ease-out 1; }
@keyframes d-count {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); color: var(--emerald); }
  100% { transform: scale(1); }
}

.d-bar {
  margin: 0 18px 6px;
  height: 8px;
  background: var(--primary-soft);
  border-radius: 999px;
  overflow: hidden;
}
.d-bar-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 999px;
  transition: width 0.8s cubic-bezier(0.2, 1, 0.2, 1);
}

/* Pass card */
.d-passcard {
  margin: 8px 18px;
  background: var(--card);
  border-radius: 14px;
  padding: 12px;
  box-shadow: var(--shadow-ambient);
}
.d-passhead {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--text-2);
}
.d-passboost {
  background: var(--gold-soft); color: var(--gold-dark);
  padding: 2px 7px; border-radius: 999px;
  font-size: 9px;
}
.d-passtier {
  font-size: 15px; font-weight: 800;
  margin: 4px 0 6px;
  display: flex; align-items: center; gap: 6px;
}
.d-passtier span { color: var(--text-3); font-weight: 600; font-size: 12px; }
.d-passtier-glow {
  font-size: 10px !important;
  color: var(--gold-dark) !important;
  font-weight: 900 !important;
  animation: d-glow-pop 0.6s ease-out 1;
}
@keyframes d-glow-pop {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}
.d-passbar {
  height: 6px; background: var(--primary-soft); border-radius: 999px; overflow: hidden;
}
.d-passbar > div {
  height: 100%; background: var(--primary); border-radius: 999px;
  transition: width 1s cubic-bezier(0.2, 1, 0.2, 1);
}
.d-passmeta { font-size: 10px; color: var(--text-2); margin-top: 6px; }
.d-pass-unlocked { box-shadow: 0 0 0 2px var(--gold), var(--shadow-lift); }

/* Tasks */
.d-tasks {
  padding: 0 18px;
  display: flex; flex-direction: column; gap: 8px;
}
.d-task {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: var(--card);
  box-shadow: var(--shadow-ambient);
  position: relative;
  transition: all 0.3s;
}
.d-task-b { border-left: 3px solid var(--primary); }
.d-task-c { border-left: 3px solid var(--coral); }
.d-task-g { border-left: 3px solid var(--emerald); }
.d-task-y { border-left: 3px solid var(--gold); }
.d-task-sparkle {
  font-size: 14px;
  color: var(--gold);
}
.d-task-body { flex: 1; min-width: 0; }
.d-task-title { font-size: 13px; font-weight: 700; }
.d-task-done-lbl { font-size: 10px; color: var(--emerald); font-weight: 800; margin-top: 2px; }
.d-task-done { opacity: 0.6; }
.d-task-done .d-task-title { text-decoration: line-through; }
.d-task-hl {
  animation: d-task-tap 0.45s ease-out 1;
  box-shadow: 0 0 0 3px var(--primary-soft), var(--shadow-ambient);
}
@keyframes d-task-tap {
  0% { transform: scale(1); }
  50% { transform: scale(0.97); }
  100% { transform: scale(1); }
}
.d-task-pulse {
  animation: d-task-pulse 0.7s ease-out 1;
}
@keyframes d-task-pulse {
  0% { transform: scale(1); background: white; }
  40% { transform: scale(1.03); background: var(--emerald-soft); }
  100% { transform: scale(1); background: white; }
}
.d-task-phoenix {
  box-shadow: 0 0 0 2px var(--coral), 0 4px 16px rgba(255, 107, 107, 0.25);
  background: linear-gradient(90deg, white, #FFF1F1);
}
.d-task-2x {
  margin-left: auto;
  padding: 4px 10px;
  background: var(--coral);
  color: white;
  border-radius: 999px;
  font-size: 11px; font-weight: 900;
  animation: d-flame-pulse 1.4s ease-in-out infinite;
}
.d-task-xpbadge {
  margin-left: auto;
  padding: 3px 8px;
  background: var(--primary-soft);
  color: var(--primary-dark);
  border-radius: 999px;
  font-size: 10px; font-weight: 800;
}

/* Tabbar */
.d-tabbar {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 10px 12px 18px;
  background: var(--card);
  border-top: 1px solid rgba(15,23,42,0.06);
  margin-top: auto;
}
.d-tab {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--text-3);
  font-size: 8px;
  font-weight: 900;
  letter-spacing: 0.08em;
}
.d-tab.active { color: var(--primary); }

/* Verify modal */
.d-modal {
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.4);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 20;
}
.d-modal-in { animation: d-modal-in 0.35s ease-out 1; }
@keyframes d-modal-in { from { opacity: 0; } to { opacity: 1; } }
.d-modal-card {
  background: white;
  border-radius: 22px 22px 0 0;
  padding: 20px 18px 28px;
  width: 100%;
  animation: d-sheet-up 0.35s cubic-bezier(0.2, 1, 0.2, 1) 1;
}
@keyframes d-sheet-up {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.d-modal-head { display: flex; justify-content: space-between; align-items: center; }
.d-modal-title { font-size: 15px; font-weight: 800; }
.d-modal-close { font-size: 22px; color: var(--text-3); line-height: 1; }
.d-modal-sub { font-size: 11px; color: var(--text-2); margin: 10px 0 12px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; }
.d-verify-opts {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.d-verify-opt {
  padding: 14px 10px;
  border-radius: 14px;
  background: var(--section);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700;
  color: var(--text);
}
.d-verify-opt > :first-child { font-size: 20px; }
.d-verify-opt-hot {
  background: var(--primary);
  color: white;
  animation: d-hot-pulse 1s ease-in-out infinite;
  box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.25);
}
@keyframes d-hot-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

.d-proc-ring {
  width: 56px; height: 56px;
  margin: 22px auto 16px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--primary), var(--primary-light), var(--primary) 75%, transparent);
  animation: d-ring-spin-inf 1.2s linear infinite;
  display: flex; align-items: center; justify-content: center;
}
.d-proc-ring > div {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: white;
}
@keyframes d-ring-spin-inf { to { transform: rotate(360deg); } }
.d-proc-rows { display: flex; flex-direction: column; gap: 6px; }
.d-proc-row {
  padding: 8px 12px;
  background: var(--section);
  border-radius: 10px;
  font-size: 12px;
  display: flex; align-items: center; gap: 8px;
}
.d-proc-row.done { background: var(--emerald-soft); color: #065F46; font-weight: 700; }
.d-proc-spinner {
  width: 12px; height: 12px;
  border: 2px solid var(--text-3);
  border-top-color: transparent;
  border-radius: 50%;
  animation: d-ring-spin-inf 0.8s linear infinite;
}

/* Reward burst */
.d-burst-wrap {
  position: absolute;
  top: 52%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 30;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.d-burst-xp {
  font-size: 40px; font-weight: 900;
  color: var(--emerald);
  text-shadow: 0 2px 12px rgba(13, 150, 104, 0.4);
  letter-spacing: -0.03em;
  animation: d-xp-rise 1.4s cubic-bezier(0.2, 1, 0.2, 1) 1;
}
.d-burst-coins {
  font-size: 22px; font-weight: 800; color: var(--gold-dark);
  animation: d-xp-rise 1.4s 0.15s cubic-bezier(0.2, 1, 0.2, 1) 1 backwards;
}
.d-burst-label {
  font-size: 10px; font-weight: 900; letter-spacing: 0.16em;
  padding: 4px 10px; border-radius: 999px;
  text-transform: uppercase;
  animation: d-xp-rise 1.4s cubic-bezier(0.2, 1, 0.2, 1) 1;
}
.d-burst-phoenix {
  background: var(--coral); color: white;
}
@keyframes d-xp-rise {
  0% { opacity: 0; transform: translateY(30px) scale(0.6); }
  30% { opacity: 1; transform: translateY(0) scale(1.08); }
  70% { opacity: 1; transform: translateY(-10px) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.95); }
}
.d-burst-p {
  position: absolute;
  top: 50%; left: 50%;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--gold);
  animation: d-particle 1s ease-out 1 backwards;
}
@keyframes d-particle {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
  100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.2); opacity: 0; }
}

/* Pass toast */
.d-toast {
  position: absolute;
  top: 60px; left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  border-radius: 14px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 12px 32px rgba(15,23,42,0.4);
  z-index: 25;
  max-width: 88%;
}
.d-toast-in { animation: d-toast-in 0.5s cubic-bezier(0.2, 1, 0.2, 1) 1; }
@keyframes d-toast-in {
  from { opacity: 0; transform: translate(-50%, -20px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}
.d-toast-icon { font-size: 22px; }
.d-toast-title { font-size: 12px; font-weight: 800; }
.d-toast-sub { font-size: 10px; opacity: 0.75; }

.d-rewards-sheet {
  position: absolute;
  left: 12px; right: 12px; bottom: 70px;
  background: white;
  border-radius: 18px;
  padding: 14px;
  box-shadow: var(--shadow-float);
  z-index: 24;
}
.d-rewards-in { animation: d-sheet-up 0.5s cubic-bezier(0.2, 1, 0.2, 1) 1; }
.d-rewards-head { font-size: 11px; font-weight: 900; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-2); margin-bottom: 8px; }
.d-rewards-row { display: flex; gap: 8px; flex-wrap: wrap; }
.d-reward-chip {
  padding: 8px 12px; border-radius: 10px;
  background: var(--section); font-size: 11px; font-weight: 800;
}
.d-reward-chip.gold { background: var(--gold-soft); color: var(--gold-dark); }
.d-reward-chip.premium { background: linear-gradient(135deg, var(--purple), #A78BFA); color: white; }

/* Level flash */
.d-level-flash {
  position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(245, 166, 35, 0.4), transparent 60%);
  pointer-events: none;
  animation: d-flash 0.7s ease-out 1;
  z-index: 15;
}
@keyframes d-flash {
  0% { opacity: 0; }
  30% { opacity: 1; }
  100% { opacity: 0; }
}

/* Level up modal */
.d-level-card { text-align: center; }
.d-level-ring-lg {
  width: 80px; height: 80px;
  margin: 6px auto 14px;
  border-radius: 50%;
  background: conic-gradient(var(--gold), var(--primary), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: 900; color: white;
  position: relative;
  animation: d-ring-spin-once 0.9s ease-out 1;
}
@keyframes d-ring-spin-once {
  0% { transform: rotate(0); }
  100% { transform: rotate(360deg); }
}
.d-level-ring-lg::before {
  content: '';
  position: absolute; inset: 6px;
  border-radius: 50%;
  background: white;
}
.d-level-ring-lg span {
  position: relative; z-index: 1;
  color: var(--primary-dark);
}
.d-level-title { font-size: 22px; font-weight: 900; letter-spacing: 0.08em; color: var(--primary-dark); margin-top: 6px; }
.d-level-sub { font-size: 12px; color: var(--text-2); margin: 6px 0 14px; }
.d-level-perks { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.d-level-perks > div {
  padding: 8px 10px;
  background: var(--section);
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
}
.d-level-cta {
  width: 100%;
  padding: 12px;
  background: var(--primary);
  color: white;
  border-radius: 12px;
  font-weight: 800;
  font-size: 13px;
}

/* Phoenix banner */
.d-phoenix-banner {
  margin: 6px 18px 8px;
  padding: 10px 12px;
  background: linear-gradient(90deg, var(--coral-soft), #FEF3F3);
  border-radius: 14px;
  border-left: 3px solid var(--coral);
  display: flex; align-items: center; gap: 10px;
}
.d-phoenix-icon {
  font-size: 22px;
  animation: d-flame-dance 1.6s ease-in-out infinite;
}
@keyframes d-flame-dance {
  0%, 100% { transform: scale(1) rotate(-4deg); }
  50% { transform: scale(1.12) rotate(4deg); }
}
.d-phoenix-title { font-size: 12px; font-weight: 900; color: #9B1C1C; }
.d-phoenix-sub { font-size: 10px; color: var(--text-2); }

/* Resilience card */
.d-res-card {
  margin: 10px 18px;
  padding: 10px 12px;
  background: white;
  border-radius: 14px;
  box-shadow: var(--shadow-ambient);
  animation: d-sheet-up 0.5s cubic-bezier(0.2, 1, 0.2, 1) 1;
}
.d-res-row {
  display: flex; justify-content: space-between;
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
}
.d-res-label { color: var(--text-2); }
.d-res-delta { color: var(--emerald); animation: d-count 0.5s 1; }
.d-res-bar {
  margin: 6px 0 4px;
  height: 6px; background: #E2E8F0; border-radius: 999px; overflow: hidden;
}
.d-res-bar > div {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--emerald));
  transition: width 1s cubic-bezier(0.2, 1, 0.2, 1);
}
.d-res-tier { font-size: 10px; color: var(--text-2); }

/* Squad */
.d-squad-head { padding: 10px 18px 4px; }
.d-squad-title { font-size: 18px; font-weight: 900; letter-spacing: -0.015em; }
.d-squad-sub { font-size: 11px; color: var(--text-2); }
.d-squad-goal {
  margin: 8px 18px;
  padding: 12px;
  background: white; border-radius: 14px;
  box-shadow: var(--shadow-ambient);
}
.d-squad-goal-head { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-2); }
.d-squad-count { color: var(--primary-dark); font-size: 13px; }
.d-squad-goal-bar {
  margin: 8px 0 6px;
  height: 8px; background: var(--primary-soft); border-radius: 999px; overflow: hidden;
}
.d-squad-goal-bar > div {
  height: 100%; background: var(--primary); border-radius: 999px;
}
.d-squad-goal-sub { font-size: 10px; color: var(--text-2); }
.d-squad-members { padding: 0 18px; display: flex; flex-direction: column; gap: 6px; }
.d-squad-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: white; border-radius: 12px;
  box-shadow: var(--shadow-ambient);
  transition: all 0.3s;
}
.d-squad-row-in {
  animation: d-squad-pop 0.6s ease-out 1;
}
@keyframes d-squad-pop {
  0% { background: var(--emerald-soft); transform: scale(1.02); }
  100% { background: white; transform: scale(1); }
}
.d-squad-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 12px; color: white;
}
.d-squad-avatar.k { background: linear-gradient(135deg, #0EA5E9, #00628C); }
.d-squad-avatar.m { background: linear-gradient(135deg, #F5A623, #C17F00); }
.d-squad-avatar.j { background: linear-gradient(135deg, #8B5CF6, #6D28D9); }
.d-squad-body { flex: 1; min-width: 0; }
.d-squad-name { font-size: 12px; font-weight: 800; }
.d-squad-sub-row { font-size: 10px; color: var(--text-2); }
.d-squad-status {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 13px;
}
.d-squad-done { background: var(--emerald); color: white; }
.d-squad-pending { background: #F1F5F9; color: var(--text-3); }

.d-squad-feed { margin: 10px 18px; padding-bottom: 8px; }
.d-feed-item {
  display: flex; gap: 10px; padding: 8px 10px;
  background: white; border-radius: 12px;
  box-shadow: var(--shadow-ambient);
  margin-bottom: 6px;
  align-items: center;
}
.d-feed-in { animation: d-feed-in 0.6s cubic-bezier(0.2, 1, 0.2, 1) 1; }
@keyframes d-feed-in {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.d-feed-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: white; font-size: 12px;
}
.d-feed-avatar.m { background: linear-gradient(135deg, #F5A623, #C17F00); }
.d-feed-avatar.j { background: linear-gradient(135deg, #8B5CF6, #6D28D9); }
.d-feed-text { font-size: 12px; }
.d-feed-time { font-size: 10px; color: var(--text-2); }

/* RAIL (right side) */
.demo2-rail {
  display: flex; flex-direction: column; gap: 16px;
}
.demo2-rail-title {
  font-size: 11px; font-weight: 900; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-3);
}
.demo2-flowlist {
  display: flex; flex-direction: column; gap: 12px;
}
.demo2-flowitem {
  text-align: left;
  padding: 18px 20px;
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow-ambient);
  transition: all 0.25s;
  border: 2px solid transparent;
  cursor: pointer;
}
.demo2-flowitem:hover { transform: translateX(4px); }
.demo2-flowitem.active {
  border-color: var(--primary);
  box-shadow: var(--shadow-lift);
  transform: translateX(0);
}
.demo2-flowitem-head {
  display: flex; align-items: baseline; gap: 12px;
}
.demo2-flowitem-num {
  font-family: "SF Mono", monospace;
  font-size: 11px; font-weight: 700;
  color: var(--text-3);
}
.demo2-flowitem.active .demo2-flowitem-num { color: var(--primary); }
.demo2-flowitem-label {
  font-size: 20px; font-weight: 800; letter-spacing: -0.015em;
}
.demo2-flowitem-sub {
  font-size: 13px; color: var(--text-2);
  margin-top: 4px; margin-left: 32px;
}
.demo2-flowitem-detail {
  margin-top: 14px; margin-left: 32px;
  font-size: 14px; color: var(--text-2); line-height: 1.6;
  padding-top: 14px;
  border-top: 1px solid var(--ghost-border);
}
.demo2-step-caption {
  margin-top: 10px;
  padding: 8px 12px;
  background: var(--primary-soft);
  color: var(--primary-dark);
  border-radius: 10px;
  font-size: 13px; font-weight: 700;
  display: inline-block;
}

/* Playbar */
.demo2-playbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center;
  padding: 12px 16px;
  background: var(--card);
  border-radius: 999px;
  box-shadow: var(--shadow-ambient);
}
.demo2-play-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  background: var(--primary);
  color: white;
  border-radius: 999px;
  font-weight: 800; font-size: 13px;
}
.demo2-restart-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: var(--section);
  color: var(--text);
  border-radius: 999px;
  font-weight: 700; font-size: 12px;
}
.demo2-step-dots { display: flex; gap: 6px; margin-left: 4px; }
.demo2-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #E2E8F0;
  transition: background 0.2s, transform 0.2s;
}
.demo2-dot.on { background: var(--primary); }
.demo2-dot:hover { transform: scale(1.3); }


/* ============================================================
   AVATAR CREATION FLOW
   ============================================================ */
.d-av-screen {
  display: flex; flex-direction: column;
  height: 100%;
  padding: 10px 14px 0;
  gap: 10px;
  color: var(--text);
  position: relative;
  overflow: hidden;
}
.d-av-topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 4px;
}
.d-av-step { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; color: var(--text-2); text-transform: uppercase; }
.d-av-dots { display: flex; gap: 5px; }
.d-av-dots span {
  width: 20px; height: 3px; border-radius: 2px;
  background: #E2E8F0;
}
.d-av-dots span.on { background: var(--primary); }

.d-av-fadein { animation: avFade 0.5s ease both; }
@keyframes avFade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Welcome */
.d-av-welcome {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  padding: 0 18px;
  gap: 14px;
}
.d-av-welcome-glyph {
  position: relative;
  width: 90px; height: 90px;
  display: grid; place-items: center;
  margin-bottom: 6px;
}
.d-av-glyph-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 2px dashed var(--primary);
  animation: avSpin 8s linear infinite;
  opacity: 0.5;
}
.d-av-glyph-core {
  width: 62px; height: 62px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  display: grid; place-items: center;
  font-size: 26px;
  box-shadow: 0 8px 24px rgba(14,165,233,0.45);
  animation: avPulse 2.2s ease-in-out infinite;
}
@keyframes avSpin { to { transform: rotate(360deg); } }
@keyframes avPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
.d-av-welcome-title {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--text);
}
.d-av-welcome-sub {
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-2);
  max-width: 240px;
}
.d-av-cta {
  margin-top: 6px;
  padding: 11px 22px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border: none;
  border-radius: 999px;
  font-size: 12px; font-weight: 800;
  box-shadow: 0 6px 18px rgba(14,165,233,0.35);
  cursor: pointer;
}

/* Camera */
.d-av-camera {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  gap: 14px;
  padding: 8px 0 12px;
}
.d-av-viewfinder {
  position: relative;
  width: 78%;
  aspect-ratio: 3/4;
  border-radius: 22px;
  background: radial-gradient(ellipse at center, #1C2638, #0B1220);
  overflow: hidden;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
}
.d-av-frame-corners span {
  position: absolute;
  width: 18px; height: 18px;
  border: 2.5px solid var(--primary);
}
.d-av-frame-corners span:nth-child(1) { top: 10px; left: 10px; border-right: none; border-bottom: none; border-radius: 4px 0 0 0; }
.d-av-frame-corners span:nth-child(2) { top: 10px; right: 10px; border-left: none; border-bottom: none; border-radius: 0 4px 0 0; }
.d-av-frame-corners span:nth-child(3) { bottom: 10px; left: 10px; border-right: none; border-top: none; border-radius: 0 0 0 4px; }
.d-av-frame-corners span:nth-child(4) { bottom: 10px; right: 10px; border-left: none; border-top: none; border-radius: 0 0 4px 0; }
.d-av-face-outline {
  position: absolute;
  inset: 12% 18%;
}
.d-av-scanline {
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 3px;
  background: linear-gradient(to right, transparent, var(--primary), transparent);
  box-shadow: 0 0 14px var(--primary);
  animation: avScan 2.4s ease-in-out infinite;
}
@keyframes avScan {
  0% { top: 8%; }
  50% { top: 88%; }
  100% { top: 8%; }
}
.d-av-cam-hint {
  font-size: 11px; color: var(--text-2); font-weight: 600;
}
.d-av-shutter {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 3px solid white;
  background: rgba(14,165,233,0.1);
  display: grid; place-items: center;
  box-shadow: 0 0 0 3px var(--primary);
}
.d-av-shutter-inner {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--primary);
  animation: avShutter 1.6s ease-in-out infinite;
}
@keyframes avShutter {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(0.85); }
}

/* Processing */
.d-av-processing, .d-av-drawing {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  gap: 12px;
  padding: 6px 18px 12px;
}
.d-av-proc-head {
  font-size: 13px; font-weight: 800; color: var(--text);
  letter-spacing: -0.01em;
}
.d-av-proc-canvas, .d-av-draw-canvas {
  position: relative;
  width: 140px; height: 160px;
  border-radius: 16px;
  background: linear-gradient(160deg, #0C1830, #1A2540);
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0, 98, 140, 0.25);
}
.d-av-draw-canvas {
  background: linear-gradient(160deg, #EBF7FF, #D9EEFE);
}
.d-av-stroke-ani {
  opacity: 0;
  animation: avDrawIn 0.45s ease forwards;
}
@keyframes avDrawIn {
  from { opacity: 0; transform: scale(0.92); }
  to { opacity: 1; transform: scale(1); }
}
.d-av-draw-canvas > svg * {
  transform-origin: center;
}
.d-av-brush {
  position: absolute;
  font-size: 22px;
  top: 30%; left: 68%;
  animation: avBrush 1.2s ease-in-out infinite;
  text-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
@keyframes avBrush {
  0%, 100% { transform: translate(0, 0) rotate(-18deg); }
  25%      { transform: translate(-30px, -8px) rotate(-12deg); }
  50%      { transform: translate(-10px, 16px) rotate(-24deg); }
  75%      { transform: translate(-38px, 4px) rotate(-18deg); }
}
.d-av-proc-rows {
  width: 100%;
  display: flex; flex-direction: column; gap: 5px;
  font-size: 11px;
  color: var(--text-2);
}
.d-av-proc-row {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  background: rgba(14,165,233,0.05);
  border-radius: 8px;
}
.d-av-proc-row.done { color: #16A34A; background: rgba(22,163,74,0.08); }

/* Reveal */
.d-av-reveal {
  flex: 1;
  position: relative;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px;
  padding: 0 18px;
  overflow: hidden;
}
.d-av-reveal-flash {
  position: absolute; inset: 0;
  background: white;
  animation: avFlash 0.6s ease forwards;
  pointer-events: none;
  z-index: 2;
}
@keyframes avFlash {
  0% { opacity: 1; }
  100% { opacity: 0; }
}
.d-av-reveal-title {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 0.22em;
  color: var(--primary);
  animation: avRevealText 0.6s 0.4s ease both;
}
@keyframes avRevealText {
  from { opacity: 0; transform: translateY(-6px); letter-spacing: 0.12em; }
  to   { opacity: 1; transform: translateY(0); letter-spacing: 0.22em; }
}
.d-av-reveal-card {
  background: var(--card);
  border-radius: 20px;
  padding: 20px 22px 16px;
  box-shadow: var(--shadow-ambient), 0 0 0 1px var(--border);
  display: flex; flex-direction: column; align-items: center;
  gap: 8px;
  animation: avRevealCard 0.7s 0.35s cubic-bezier(0.2, 1.5, 0.3, 1) both;
}
@keyframes avRevealCard {
  from { opacity: 0; transform: scale(0.6) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.d-av-reveal-ring {
  position: relative;
  width: 112px; height: 112px;
  border-radius: 50%;
  padding: 4px;
  background: conic-gradient(from 0deg, var(--primary), var(--primary-light), var(--gold), var(--primary));
  animation: avSpin 5s linear infinite;
}
.d-av-reveal-portrait {
  width: 100%; height: 100%;
  border-radius: 50%;
  overflow: hidden;
  background: white;
}
.d-av-reveal-portrait > svg { display: block; }
.d-av-reveal-name {
  font-size: 18px; font-weight: 900;
  color: var(--text);
  letter-spacing: -0.02em;
}
.d-av-reveal-class {
  font-size: 11px; color: var(--text-2); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.d-av-reveal-actions {
  display: flex; gap: 8px;
  margin-top: 10px;
}
.d-av-btn-primary {
  padding: 9px 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border: none; border-radius: 999px;
  font-size: 11px; font-weight: 800;
  box-shadow: 0 4px 12px rgba(14,165,233,0.35);
}
.d-av-btn-ghost {
  padding: 9px 14px;
  background: var(--section);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 11px; font-weight: 800;
}
.d-av-sparkle {
  position: absolute;
  left: 50%; top: 50%;
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--gold);
  transform: translate(-50%, -50%);
  animation: avSparkle 1.4s ease-out both;
  animation-delay: 0.7s;
  pointer-events: none;
}
@keyframes avSparkle {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
  30%  { opacity: 1; transform: translate(calc(-50% + var(--x) * 0.4), calc(-50% + var(--y) * 0.4)) scale(1); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.4); }
}

/* ============================================================
   SMART FOOD VERIFICATION FLOW
   ============================================================ */
.d-food-card {
  margin: 10px 14px 0;
  padding: 12px;
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 14px rgba(0,98,140,0.06);
  display: flex; flex-direction: column; gap: 10px;
}
.d-food-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.d-food-taskrow {
  display: flex; align-items: center; gap: 10px;
}
.d-food-dot {
  width: 10px; height: 10px; border-radius: 3px;
  background: var(--accent-2-coral, #F57862);
  box-shadow: 0 0 0 3px rgba(245,120,98,0.15);
}
.d-food-title {
  font-size: 13px; font-weight: 800; color: var(--text);
  letter-spacing: -0.01em;
}
.d-food-sub {
  font-size: 10px; color: var(--text-2); font-weight: 600;
  margin-top: 1px;
}
.d-food-xp {
  background: linear-gradient(135deg, var(--gold, #F5A623), #FCD34D);
  color: #5A3D0A;
  font-size: 10px; font-weight: 900;
  padding: 3px 8px;
  border-radius: 999px;
  letter-spacing: 0.04em;
}

.d-food-photo {
  position: relative;
  width: 100%;
  aspect-ratio: 220/130;
  border-radius: 12px;
  overflow: hidden;
  background: #EEF2F6;
  box-shadow: inset 0 0 0 1px var(--border);
}
.d-food-empty {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px;
  background: repeating-linear-gradient(
    135deg,
    #F4F7FA 0 10px,
    #EEF2F6 10px 20px
  );
}
.d-food-cam-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  display: grid; place-items: center;
  font-size: 20px;
  box-shadow: 0 6px 16px rgba(14,165,233,0.3);
  animation: avPulse 1.8s ease-in-out infinite;
}
.d-food-empty-label {
  font-size: 11px; color: var(--text-2); font-weight: 700;
}
.d-food-img {
  position: absolute; inset: 0;
  animation: avFade 0.4s ease both;
}
.d-food-flash {
  position: absolute; inset: 0;
  background: white;
  animation: avFlash 0.35s ease forwards;
  pointer-events: none;
}
.d-food-scanline {
  position: absolute; left: 0; right: 0; top: 0;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--primary), transparent);
  box-shadow: 0 0 12px var(--primary);
  animation: avScan 1.6s ease-in-out infinite;
  pointer-events: none;
  z-index: 3;
}
.d-food-box {
  position: absolute;
  left: var(--l); top: var(--t);
  width: var(--w); height: var(--h);
  border: 1.6px solid var(--primary);
  border-radius: 4px;
  background: rgba(14,165,233,0.08);
  animation: foodBox 0.4s ease both;
  animation-delay: var(--d);
  opacity: 0;
}
.d-food-box > span {
  position: absolute;
  top: -16px; left: -2px;
  background: var(--primary);
  color: white;
  font-size: 8px; font-weight: 800;
  padding: 2px 5px;
  border-radius: 3px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}
@keyframes foodBox {
  from { opacity: 0; transform: scale(0.7); }
  to   { opacity: 1; transform: scale(1); }
}
.d-food-verified-tag {
  position: absolute;
  bottom: 6px; left: 6px;
  padding: 4px 9px;
  background: rgba(255,255,255,0.95);
  color: #16A34A;
  font-size: 10px; font-weight: 800;
  border-radius: 999px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.12);
  animation: avFade 0.4s ease both;
}

.d-food-macros {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.d-macro {
  background: var(--section);
  border-radius: 10px;
  padding: 7px 4px;
  text-align: center;
  opacity: 0.4;
  transform: translateY(4px);
  transition: opacity 0.4s ease, transform 0.4s ease, background 0.4s ease;
}
.d-macro-in {
  opacity: 1;
  transform: translateY(0);
  background: linear-gradient(180deg, #EBF7FF, #D9EEFE);
  box-shadow: 0 2px 8px rgba(14,165,233,0.12);
}
.d-macro-value {
  font-size: 15px; font-weight: 900; color: var(--text);
  line-height: 1;
}
.d-macro-unit {

const { useState, useEffect, useRef } = React;

function useInView(threshold = 0.2) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setInView(true); io.disconnect(); } },
      { threshold }
    );
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return [ref, inView];
}

/* ========== HOME PHONE — matching real app screenshot ========== */
function HomePhone({ interactive = false }) {
  const initial = [
    { id: 1, title: "Review your spending", tone: "b", done: true, xp: 40 },
    { id: 2, title: "Eat healthy", tone: "c", done: true, xp: 30 },
    { id: 3, title: "Treadmill", tone: "g", done: false, xp: 60 },
    { id: 4, title: "Read 20 pages", tone: "y", done: false, xp: 40 },
  ];
  const [tasks, setTasks] = useState(initial);
  const [xp, setXp] = useState(5.9);
  const [bursts, setBursts] = useState([]);
  const phoneRef = useRef(null);
  const XP_MAX = 10;
  const pct = Math.min((xp / XP_MAX) * 100, 100);

  function toggle(id, evt) {
    if (!interactive) return;
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    const wasDone = t.done;
    setTasks(prev => prev.map(x => x.id === id ? { ...x, done: !x.done } : x));
    if (!wasDone) {
      const delta = t.xp / 20; // xp out of 10 scale
      setXp(v => Math.min(XP_MAX, v + delta));
      if (phoneRef.current && evt) {
        const rect = evt.currentTarget.getBoundingClientRect();
        const pr = phoneRef.current.getBoundingClientRect();
        const id2 = Math.random();
        setBursts(b => [...b, {
          id: id2,
          x: rect.left - pr.left + rect.width / 2 - 20,
          y: rect.top - pr.top - 6,
          text: `+${t.xp} XP`
        }]);
        setTimeout(() => setBursts(b => b.filter(x => x.id !== id2)), 1200);
      }
    } else {
      setXp(v => Math.max(0, v - t.xp / 20));
    }
  }

  return (
    <div className="phone" ref={phoneRef}>
      <div className="phone-notch" />
      <div className="phone-screen">
        <div className="ph">
          <div className="ph-status">
            <span>9:12</span>

              <div className="a-avatar">K</div>
              <div>
                <div className="a-name">Kevin</div>
                <div className="a-sub">Level 3 · Pathmaker</div>
              </div>
            </div>
            <div className="a-head-right">
              <div className="a-flame-chip">🔥 5</div>
              <div className="a-icon-btn"><Icon.msg /></div>
              <div className="a-icon-btn"><Icon.menu /></div>
            </div>
          </div>

          <div className="a-sec-title">Main Level</div>
          <div className="a-level-row">
            <div className="a-big-level">Level 0{Math.max(1, Math.floor(xp) + 1)}</div>
            <div className="a-xp">💎 {xp.toFixed(1)} <span className="xp-small">/ {XP_MAX} XP</span></div>
          </div>
          <div className="a-bar">
            <div className="a-bar-fill" style={{ width: `${pct}%` }} />
          </div>

          <div className="a-card">
            <div className="a-pass-head">
              <span className="a-pass-label">April Pass</span>
              <span className="a-pass-boost"><Icon.bolt /> 1.5× XP</span>
            </div>
            <div className="a-pass-title">Tier 2 <span className="of">/ 30</span></div>
            <div className="a-pass-bar">
              <div className="a-pass-bar-fill" />
            </div>
            <div className="a-pass-meta">1/5 XP to Tier 3</div>
          </div>

          <div className="a-mood">😁 Radiant — logged</div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "4px 2px 8px" }}>
            <div className="a-sec-title" style={{ margin: 0 }}>Today's Tasks</div>
            <div style={{ fontSize: 11, color: "var(--primary-dark)", fontWeight: 800 }}>View Map</div>
          </div>

          <div className="a-tasks">
            {tasks.map(t => (
              <div
                key={t.id}
                className={`a-task ${t.tone}${t.done ? " done" : ""}`}
                onClick={(e) => toggle(t.id, e)}
              >
                <div className="a-task-sparkle"><Icon.sparkle /></div>
                <div>

                </div>
              </div>
            ))}
          </div>

          <div className="a-tabbar">
            <div className="a-tab active">
              <div className="a-tab-icon"><Icon.home /></div>
              <span>HOME</span>
            </div>
            <div className="a-tab">
              <div className="a-tab-icon"><Icon.peers /></div>
              <span>PEERS</span>
            </div>
            <div className="a-tab">
              <div className="a-tab-icon"><Icon.char /></div>
              <span>CHARACTER</span>
            </div>
            <div className="a-tab">
              <div className="a-tab-icon"><Icon.goals /></div>
              <span>GOALS</span>
            </div>
            <div className="a-tab">
              <div className="a-tab-icon"><Icon.coach /></div>
              <span>COACH</span>
            </div>
          </div>

          {bursts.map(b => (

          ))}
        </div>
      </div>
      <div className="phone-home-bar" />
    </div>
  );
}

    const delays = {
      avatar: [1000, 1200, 1800, 1400, 2200],

        }

    return () => clearTimeout(id);

    e.preventDefault();
    if (!/^\S+@\S+\.\S+$/.test(email)) { setStatus("error"); return; }
    setStatus("loading");
    const ok = await joinWaitlist(email, source).catch(() => false);
    setStatus(ok ? "success" : "error");
  };
  if (status === "success") {
    return (
      <div className="wl-success">
        <span className="wl-success-ico">✓</span>
        You're on the list. We'll ping you the day the App Store goes live.
      </div>
    );
  }
  return (
    <form className="wl-form" onSubmit={submit}>
      <input
        type="email"
        inputMode="email"
        autoComplete="email"
        placeholder="you@your-domain.com"
        value={email}
        onChange={(e) => setEmail(e.target.value)}
        disabled={status === "loading"}
        aria-label="Email address"
      />
      <button type="submit" disabled={status === "loading"}>
        {status === "loading" ? "Saving…" : "Join the waitlist"}
      </button>
      {status === "error" && (
        <div className="wl-error">Something went wrong — double-check your email and try again.</div>
      )}
    </form>
  );
}
